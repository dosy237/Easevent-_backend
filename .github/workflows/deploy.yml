name: CI/CD Pipeline

on:
push:
branches:
- main
pull_request:
branches:
- main

jobs:
test:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Run Tests
    run: |
      echo "Tests are currently ignored/skipped as per project configuration."
      # python manage.py test
```

deploy:
needs: test
if: github.event_name == 'push' && github.ref == 'refs/heads/main'
runs-on: ubuntu-latest

```
steps:
  - name: Debug Connection Info
    run: |
      echo "Host configured"
      echo "Using user: eddy_deploy"
      echo "Using port: 22"

  - name: 📥 Git Pull Latest Code
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.SSH_HOST }}
      username: eddy_deploy
      key: ${{ secrets.SSH_KEY }}
      port: 22
      debug: true
      timeout: 60s
      command_timeout: 15m
      script: |
        whoami
        pwd

        cd /var/www/Easevent-_backend || \
        cd ~/var/www/Easevent-_backend || \
        cd ~/projects/Easevent-_backend

        git pull origin main

  - name: 🛑 Docker Compose Down
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.SSH_HOST }}
      username: eddy_deploy
      key: ${{ secrets.SSH_KEY }}
      port: 22
      debug: true
      timeout: 60s
      command_timeout: 15m
      script: |
        whoami

        cd /var/www/Easevent-_backend || \
        cd ~/var/www/Easevent-_backend || \
        cd ~/projects/Easevent-_backend

        docker compose down || true

  - name: 🚀 Docker Compose Up & Build
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.SSH_HOST }}
      username: eddy_deploy
      key: ${{ secrets.SSH_KEY }}
      port: 22
      debug: true
      timeout: 60s
      command_timeout: 15m
      script: |
        whoami

        cd /var/www/Easevent-_backend || \
        cd ~/var/www/Easevent-_backend || \
        cd ~/projects/Easevent-_backend

        docker compose up -d --build
```
